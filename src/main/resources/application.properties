spring.application.name=intellibook-mall-api

# ==================== 服务器配置 ====================
server.port=8080

# ==================== HTTP 编码配置 ====================
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ==================== 电子书文件存储配置 ====================
# 文件存储根目录（相对于项目根目录）
ebook.storage.base-path=ebook-storage
# 封面图片存储路径
ebook.storage.cover-path=${ebook.storage.base-path}/covers
# 电子书文件存储路径
ebook.storage.book-path=${ebook.storage.base-path}/books
# 临时文件存储路径
ebook.storage.temp-path=${ebook.storage.base-path}/temp

# 文件访问 URL 前缀
ebook.file.url-prefix=/files

# ==================== 文件上传配置 ====================
# 单个文件最大大小（100MB）
spring.servlet.multipart.max-file-size=100MB
# 整个请求最大大小（100MB）
spring.servlet.multipart.max-request-size=100MB
# 是否启用文件上传
spring.servlet.multipart.enabled=true
# 文件上传临时目录
spring.servlet.multipart.location=${ebook.storage.temp-path}/uploads

# ==================== 文件路径策略配置 ====================
# 文件路径生成策略：FLAT（扁平结构）或 DATE_BASED（按日期分目录）
ebook.file.path-strategy=FLAT
# 支持的封面图片格式
ebook.file.image-formats=jpg,jpeg,png
# 支持的电子书格式
ebook.file.ebook-formats=pdf,epub,mobi

# ==================== 数据初始化配置 ====================
# 是否在启动时初始化测试数据（开发环境使用，生产环境设为 false）
ebook.init-data=false

# ==================== DataSource Configuration ====================
spring.datasource.url=jdbc:sqlite:C:\Users\ASUS\Desktop\intellibook-mall-api\identifier.sqlite
spring.datasource.driver-class-name=org.sqlite.JDBC

# ==================== MyBatis Configuration ====================
# MyBatis Mapper XML 文件位置
mybatis.mapper-locations=classpath:mapper/*.xml
# MyBatis 类型别名包路径
mybatis.type-aliases-package=org.example.intellibookmallapi.entity
# MyBatis 配置
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
